# Alembic数据库迁移配置文件

[alembic]
# 迁移脚本目录
script_location = migrations
# 数据库连接字符串（从环境变量或配置中获取）
sqlalchemy.url = mysql+pymysql://root:password@localhost:3306/chatbot

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
