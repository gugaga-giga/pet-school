server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pet_school?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.petschool.entity
  configuration:
    map-underscore-to-camel-case: true
